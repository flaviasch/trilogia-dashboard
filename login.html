<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trilogia Dashboard — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D2B45;
      --navy-dark: #081e30;
      --gold: #CFAE65;
      --gold-light: #e8d49b;
      --white: #FFFFFF;
      --off-white: #F9F7F4;
      --gray: #6B7280;
      --border: rgba(255,255,255,0.1);
      --error: #f87171;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus {
      outline: none;
      border-color: rgba(207,174,101,0.5);
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--gold-light); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .forgot {
      text-align: center;
      margin-top: 20px;
    }
    .forgot a {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot a:hover { color: var(--gold); }
    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <p class="logo">Trilogia <span>Dashboard</span></p>
    <p class="subtitle">Acesse sua conta para continuar</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>

    <div class="field-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="btnLogin">Entrar</button>

    <div class="divider"></div>

    <div class="forgot">
      <a href="recuperar-senha.html">Esqueci minha senha</a>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index.html';
    });

    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    btnLogin.addEventListener('click', async () => {
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Preencha e-mail e senha para continuar.');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          showError('E-mail ou senha incorretos. Verifique e tente novamente.');
        } else if (err.code === 'auth/too-many-requests') {
          showError('Muitas tentativas. Aguarde alguns minutos e tente novamente.');
        } else {
          showError('Erro ao fazer login. Tente novamente.');
        }
      }
    });

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnLogin.click();
    });
  </script>

</body>
</html>
