<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento — Trilogia Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D2B45;
      --navy-dark: #081e30;
      --navy-mid: #0f3352;
      --gold: #CFAE65;
      --gold-light: #e8d49b;
      --gold-dim: rgba(207,174,101,0.15);
      --white: #FFFFFF;
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(207,174,101,0.2);
      --positive: #4ade80;
      --positive-dim: rgba(74,222,128,0.12);
      --negative: #f87171;
      --negative-dim: rgba(248,113,113,0.12);
      --text-muted: rgba(255,255,255,0.45);
      --text-secondary: rgba(255,255,255,0.65);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy-dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* ─── Navbar ─────────────────────────────── */
    .navbar {
      background: var(--navy);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
    }
    .logo span { color: var(--gold); }
    .navbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-name { font-size: 14px; color: var(--text-secondary); }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--border-gold); color: var(--gold); }

    /* ─── Layout ─────────────────────────────── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ─── Loading ────────────────────────────── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      gap: 16px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Breadcrumb ─────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb-sep { opacity: 0.4; }
    .breadcrumb-current { color: var(--text-secondary); }

    /* ─── Page header ────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
    }
    .period-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .period-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: all 0.2s;
    }
    .period-btn:hover { color: var(--gold); border-color: var(--border-gold); }
    .period-label {
      font-size: 14px;
      color: var(--text-secondary);
      min-width: 140px;
      text-align: center;
    }

    /* ─── Upload banner ──────────────────────── */
    .upload-banner {
      background: var(--gold-dim);
      border: 1px solid var(--border-gold);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .upload-banner-text {
      font-size: 13px;
      color: var(--gold-light);
    }
    .upload-banner-text strong { display: block; font-size: 14px; color: var(--gold); margin-bottom: 2px; }
    .btn-upload {
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-upload:hover { background: var(--gold-light); }
    .upload-input { display: none; }

    /* ─── Resumo 3 cards ─────────────────────── */
    .resumo-section { margin-bottom: 40px; }
    .resumo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .resumo-card {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .resumo-card.destaque { border-color: var(--border-gold); }
    .resumo-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .resumo-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .resumo-value.positive { color: var(--positive); }
    .resumo-value.negative { color: var(--negative); }
    .resumo-value.gold { color: var(--gold); }
    .resumo-sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .resumo-pct {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      padding: 2px 8px;
      margin-top: 4px;
    }
    .resumo-pct.ok { background: var(--positive-dim); color: var(--positive); }
    .resumo-pct.alerta { background: var(--negative-dim); color: var(--negative); }

    /* ─── Seção tabela ───────────────────────── */
    .section { margin-bottom: 40px; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
    }
    .section-total {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ─── Itens de receita / despesa ─────────── */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .item-row {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .item-row:hover { border-color: rgba(255,255,255,0.14); }
    .item-row + .item-row { margin-top: 4px; }

    .item-categoria {
      font-size: 14px;
      color: var(--white);
    }
    .item-fonte {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .item-bar-col {
      width: 160px;
    }
    .item-bar-track {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .item-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--gold);
      opacity: 0.7;
    }
    .item-bar-fill.receita { background: var(--positive); }
    .item-bar-fill.despesa { background: var(--negative); opacity: 0.6; }
    .item-pct {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }
    .item-value {
      font-size: 15px;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
      min-width: 100px;
    }
    .item-value.receita { color: var(--positive); }
    .item-value.despesa { color: var(--white); }

    /* ─── Totalizador ────────────────────────── */
    .total-row {
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      border-radius: 0;
      padding: 14px 20px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .total-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .total-value {
      font-size: 16px;
      font-weight: 700;
    }
    .total-value.receita { color: var(--positive); }
    .total-value.despesa { color: var(--negative); }

    /* ─── Sobra visual ───────────────────────── */
    .sobra-box {
      background: var(--positive-dim);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .sobra-box.negativo {
      background: var(--negative-dim);
      border-color: rgba(248,113,113,0.2);
    }
    .sobra-box-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .sobra-box-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--positive);
    }
    .sobra-box.negativo .sobra-box-value { color: var(--negative); }
    .sobra-box-right {
      text-align: right;
    }
    .sobra-box-pct {
      font-size: 24px;
      font-weight: 700;
      color: var(--positive);
    }
    .sobra-box.negativo .sobra-box-pct { color: var(--negative); }
    .sobra-box-pct-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Responsive ─────────────────────────── */
    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .main { padding: 24px 16px 60px; }
      .resumo-grid { grid-template-columns: 1fr; }
      .item-bar-col { display: none; }
      .item-row { grid-template-columns: 1fr auto; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">Trilogia <span>Dashboard</span></a>
    <div class="navbar-right">
      <span class="user-name" id="userDisplayName"></span>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>
  </nav>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <span>Carregando orçamento...</span>
  </div>

  <!-- Conteúdo -->
  <main class="main" id="mainContent" style="display:none">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a href="index.html">Dashboard</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">Orçamento</span>
    </nav>

    <!-- Header + período -->
    <div class="page-header">
      <h1 class="page-title">Orçamento</h1>
      <div class="period-selector">
        <button class="period-btn" id="btnPrev">‹</button>
        <span class="period-label" id="periodoLabel">—</span>
        <button class="period-btn" id="btnNext">›</button>
      </div>
    </div>

    <!-- Banner de importação -->
    <div class="upload-banner">
      <div class="upload-banner-text">
        <strong>Importar novo Raio-X</strong>
        Exporte o CSV do Raio-X e importe aqui para atualizar seu orçamento.
      </div>
      <div>
        <input type="file" id="csvInput" class="upload-input" accept=".csv" />
        <button class="btn-upload" id="btnUpload">Importar CSV</button>
      </div>
    </div>

    <!-- Resumo -->
    <div class="resumo-section">
      <div class="resumo-grid">
        <div class="resumo-card">
          <div class="resumo-label">Receita Total</div>
          <div class="resumo-value positive" id="totalReceita">—</div>
          <div class="resumo-sub" id="qtdReceitas">—</div>
        </div>
        <div class="resumo-card">
          <div class="resumo-label">Despesa Total</div>
          <div class="resumo-value negative" id="totalDespesa">—</div>
          <div class="resumo-sub" id="pctDespesa">—</div>
        </div>
        <div class="resumo-card destaque">
          <div class="resumo-label">Sobra do Mês</div>
          <div class="resumo-value" id="totalSobra">—</div>
          <div id="sobraIndicador"></div>
        </div>
      </div>
    </div>

    <!-- Receitas -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">Receitas</h2>
        <span class="section-total" id="receitaTotal">—</span>
      </div>
      <div class="items-list" id="receitasList"></div>
    </div>

    <!-- Despesas -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">Despesas por categoria</h2>
        <span class="section-total" id="despesaTotal">—</span>
      </div>
      <div class="items-list" id="despesasList"></div>
    </div>

    <!-- Sobra destacada -->
    <div id="sobraBox"></div>

  </main>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { getOrcamento, saveOrcamento, parsearCsvRaioX } from './js/api.js';
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ─── Auth guard ───────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      document.getElementById('userDisplayName').textContent = user.displayName || user.email;
      init(user);
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    // ─── Helpers ─────────────────────────────
    const brl = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
    const pct = (v, total) => total > 0 ? `${((v / total) * 100).toFixed(1)}%` : '0%';

    // ─── Mock data ────────────────────────────
    const MOCK = {
      periodo: { mes: 4, ano: 2025 },
      receitas: [
        { categoria: 'Salário CLT',   valor: 15000 },
        { categoria: 'Renda variável (assessoria)', valor: 2500 },
        { categoria: 'Mentoria',      valor: 1000  },
      ],
      despesas: [
        { categoria: 'Moradia',       valor: 4200 },
        { categoria: 'Alimentação',   valor: 2100 },
        { categoria: 'Saúde',         valor: 1200 },
        { categoria: 'Lazer',         valor: 1000 },
        { categoria: 'Transporte',    valor: 800  },
        { categoria: 'Educação',      valor: 600  },
        { categoria: 'Assinaturas',   valor: 350  },
        { categoria: 'Vestuário',     valor: 400  },
        { categoria: 'Outros',        valor: 1650 },
      ]
    };

    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    let currentData = MOCK;

    async function init(user) {
      const agora = new Date();
      const mes = agora.getMonth() + 1;
      const ano = agora.getFullYear();
      try {
        const itens = await getOrcamento(mes, ano);
        currentData = {
          periodo: { mes, ano },
          receitas: itens.filter(i => i.tipo === 'receita').map(i => ({ categoria: i.categoria, valor: i.valor })),
          despesas: itens.filter(i => i.tipo === 'despesa').map(i => ({ categoria: i.categoria, valor: i.valor })),
        };
      } catch (err) {
        console.error('Erro ao carregar orçamento:', err);
        currentData = { periodo: { mes, ano }, receitas: [], despesas: [] };
      }
      render(currentData);
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    function render(data) {
      // Período
      document.getElementById('periodoLabel').textContent =
        `${MESES[data.periodo.mes - 1]} de ${data.periodo.ano}`;

      const totalReceita = data.receitas.reduce((s, r) => s + r.valor, 0);
      const totalDespesa = data.despesas.reduce((s, r) => s + r.valor, 0);
      const sobra = totalReceita - totalDespesa;
      const sobraPct = totalReceita > 0 ? (sobra / totalReceita) * 100 : 0;

      // Resumo
      document.getElementById('totalReceita').textContent = brl(totalReceita);
      document.getElementById('qtdReceitas').textContent = `${data.receitas.length} fonte${data.receitas.length > 1 ? 's' : ''} de renda`;
      document.getElementById('totalDespesa').textContent = brl(totalDespesa);
      document.getElementById('pctDespesa').textContent = `${pct(totalDespesa, totalReceita)} da receita`;

      const sobraEl = document.getElementById('totalSobra');
      sobraEl.textContent = brl(sobra);
      sobraEl.className = `resumo-value ${sobra >= 0 ? 'gold' : 'negative'}`;

      const indicEl = document.getElementById('sobraIndicador');
      indicEl.innerHTML = `<span class="resumo-pct ${sobraPct >= 20 ? 'ok' : 'alerta'}">
        ${sobraPct.toFixed(1)}% da receita
      </span>`;

      // Totais das seções
      document.getElementById('receitaTotal').textContent = brl(totalReceita);
      document.getElementById('despesaTotal').textContent = brl(totalDespesa);

      // Lista receitas
      const recList = document.getElementById('receitasList');
      recList.innerHTML = data.receitas
        .sort((a, b) => b.valor - a.valor)
        .map(r => {
          const p = (r.valor / totalReceita) * 100;
          return `
            <div class="item-row">
              <div>
                <div class="item-categoria">${r.categoria}</div>
              </div>
              <div class="item-bar-col">
                <div class="item-bar-track">
                  <div class="item-bar-fill receita" style="width:${p}%"></div>
                </div>
                <div class="item-pct">${p.toFixed(1)}% da receita</div>
              </div>
              <div class="item-value receita">${brl(r.valor)}</div>
            </div>`;
        }).join('') +
        `<div class="total-row">
          <span class="total-label">Total receitas</span>
          <span class="total-value receita">${brl(totalReceita)}</span>
        </div>`;

      // Lista despesas (ordenadas por valor desc)
      const despList = document.getElementById('despesasList');
      despList.innerHTML = data.despesas
        .sort((a, b) => b.valor - a.valor)
        .map(d => {
          const pDesp = (d.valor / totalDespesa) * 100;
          const pRec  = (d.valor / totalReceita) * 100;
          return `
            <div class="item-row">
              <div>
                <div class="item-categoria">${d.categoria}</div>
                <div class="item-fonte">${pct(d.valor, totalReceita)} da receita</div>
              </div>
              <div class="item-bar-col">
                <div class="item-bar-track">
                  <div class="item-bar-fill despesa" style="width:${pDesp}%"></div>
                </div>
                <div class="item-pct">${pDesp.toFixed(1)}% das despesas</div>
              </div>
              <div class="item-value despesa">${brl(d.valor)}</div>
            </div>`;
        }).join('') +
        `<div class="total-row">
          <span class="total-label">Total despesas</span>
          <span class="total-value despesa">${brl(totalDespesa)}</span>
        </div>`;

      // Sobra box
      const sobraBoxEl = document.getElementById('sobraBox');
      sobraBoxEl.innerHTML = `
        <div class="sobra-box ${sobra < 0 ? 'negativo' : ''}">
          <div>
            <div class="sobra-box-label">${sobra >= 0 ? 'Sobra disponível para investir' : 'Deficit do mês'}</div>
            <div class="sobra-box-value">${brl(Math.abs(sobra))}</div>
          </div>
          <div class="sobra-box-right">
            <div class="sobra-box-pct">${sobraPct.toFixed(1)}%</div>
            <div class="sobra-box-pct-label">da receita</div>
          </div>
        </div>`;
    }

    // ─── Navegação de período ─────────────────
    async function buscarPeriodo(mes, ano) {
      try {
        const itens = await getOrcamento(mes, ano);
        return {
          periodo: { mes, ano },
          receitas: itens.filter(i => i.tipo === 'receita').map(i => ({ categoria: i.categoria, valor: i.valor })),
          despesas: itens.filter(i => i.tipo === 'despesa').map(i => ({ categoria: i.categoria, valor: i.valor })),
        };
      } catch (err) {
        console.error('Erro ao carregar período:', err);
        return { periodo: { mes, ano }, receitas: [], despesas: [] };
      }
    }

    document.getElementById('btnPrev').addEventListener('click', async () => {
      let { mes, ano } = currentData.periodo;
      mes--;
      if (mes < 1) { mes = 12; ano--; }
      currentData = await buscarPeriodo(mes, ano);
      render(currentData);
    });

    document.getElementById('btnNext').addEventListener('click', async () => {
      let { mes, ano } = currentData.periodo;
      mes++;
      if (mes > 12) { mes = 1; ano++; }
      currentData = await buscarPeriodo(mes, ano);
      render(currentData);
    });

    // ─── Upload CSV ───────────────────────────
    document.getElementById('btnUpload').addEventListener('click', () => {
      document.getElementById('csvInput').click();
    });

    document.getElementById('csvInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';

      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const itens = parsearCsvRaioX(ev.target.result);
          const { mes, ano } = currentData.periodo;
          await saveOrcamento(mes, ano, itens);
          currentData = await buscarPeriodo(mes, ano);
          render(currentData);
        } catch (err) {
          alert(`Erro ao importar CSV: ${err.message || err}`);
        }
      };
      reader.readAsText(file, 'utf-8');
    });
  </script>

</body>
</html>
