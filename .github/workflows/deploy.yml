name: Deploy Dashboard → GitHub Pages

on:
  push:
    branches: [main]
  # Permite disparar manualmente pelo GitHub Actions UI
  workflow_dispatch:

# Permissões necessárias para o deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Cancela deploy anterior se um novo push chegar antes de terminar
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Prepara apenas os arquivos de frontend para deploy.
      # Exclui: functions/, scripts/, agentes/, arquivos de config Firebase e secrets.
      - name: Preparar arquivos de frontend
        run: |
          mkdir -p _site

          # HTMLs na raiz
          cp *.html _site/ 2>/dev/null || true

          # Assets
          cp -r css   _site/ 2>/dev/null || true
          cp -r js    _site/ 2>/dev/null || true
          cp -r icons _site/ 2>/dev/null || true

          # PWA
          cp manifest.json _site/ 2>/dev/null || true
          cp sw.js         _site/ 2>/dev/null || true

          # Imagens na raiz (foto da Flávia, etc.)
          find . -maxdepth 1 -name "*.jpg" -o -name "*.png" -o -name "*.svg" -o -name "*.webp" \
            | xargs -I{} cp {} _site/ 2>/dev/null || true

          # Arquivos especiais do GitHub Pages
          cp CNAME     _site/ 2>/dev/null || true
          cp .nojekyll _site/ 2>/dev/null || true

          echo "── Conteúdo do _site ──"
          find _site -type f | sort

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Aguardar propagação (60s)
        run: sleep 60

      - name: Dashboard carrega (HTTP 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dashboard.flaviaschusciman.com)
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Dashboard retornou $STATUS"
            exit 1
          fi
          echo "✅ Dashboard OK"

      - name: Cloud Functions respondendo
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://southamerica-east1-trilogia-dashboard.cloudfunctions.net/healthCheck)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE | Body: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ healthCheck retornou $HTTP_CODE"
            exit 1
          fi
          if ! echo "$BODY" | grep -q '"ok":true'; then
            echo "❌ healthCheck retornou ok:false — $BODY"
            exit 1
          fi
          echo "✅ Cloud Functions OK"
