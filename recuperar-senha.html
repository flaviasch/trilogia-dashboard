<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trilogia Dashboard — Recuperar Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D2B45;
      --navy-dark: #081e30;
      --gold: #CFAE65;
      --gold-light: #e8d49b;
      --white: #FFFFFF;
      --border: rgba(255,255,255,0.1);
      --error: #f87171;
      --success: #4ade80;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { outline: none; border-color: rgba(207,174,101,0.5); }
    input::placeholder { color: rgba(255,255,255,0.25); }
    .btn {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold-light); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.visible { display: block; }
    .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
    .back {
      text-align: center;
      margin-top: 20px;
    }
    .back a {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }
    .back a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <div class="card">
    <p class="logo">Trilogia <span>Dashboard</span></p>
    <p class="subtitle">Digite seu e-mail e enviaremos um link para você criar uma nova senha.</p>

    <div class="msg" id="msg"></div>

    <div class="field-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" />
    </div>

    <button class="btn" id="btnEnviar">Enviar link de recuperação</button>

    <div class="back">
      <a href="login.html">Voltar para o login</a>
    </div>
  </div>

  <script type="module">
    import { solicitarRedefinicaoSenha } from './js/api.js?v=16';

    const btn = document.getElementById('btnEnviar');
    const msgEl = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = `msg visible ${type}`;
    }

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showMsg('Digite seu e-mail para continuar.', 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        await solicitarRedefinicaoSenha(email);
        showMsg('Link enviado! Verifique sua caixa de entrada.', 'success');
        btn.textContent = 'Link enviado';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Enviar link de recuperação';
        showMsg('Erro ao enviar. Tente novamente.', 'error');
      }
    });
  </script>

</body>
</html>
